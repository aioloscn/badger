<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>短信验证码登录</title>
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(180deg, #f3f7ff 0%, #eef3ff 100%);
            font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
        }
        .login-card {
            width: 360px;
            background: #fff;
            border-radius: 16px;
            box-shadow: 0 12px 30px rgba(28, 58, 124, 0.15);
            padding: 28px 26px 24px;
            box-sizing: border-box;
        }
        .title {
            margin: 0 0 24px;
            font-size: 24px;
            color: #1f2f5f;
            text-align: center;
        }
        .input {
            width: 100%;
            height: 44px;
            border: 1px solid #d6ddf6;
            border-radius: 10px;
            padding: 0 12px;
            font-size: 15px;
            box-sizing: border-box;
            outline: none;
            margin-bottom: 12px;
        }
        .row {
            display: flex;
            gap: 10px;
            margin-bottom: 12px;
        }
        .row .input {
            margin-bottom: 0;
            flex: 1;
        }
        .btn {
            width: 100%;
            height: 44px;
            border: 0;
            border-radius: 10px;
            background: #2f74ff;
            color: #fff;
            font-size: 16px;
            cursor: pointer;
        }
        .ghost-btn {
            width: 120px;
            height: 44px;
            border: 1px solid #c7d6ff;
            border-radius: 10px;
            background: #f6f8ff;
            color: #2f74ff;
            cursor: pointer;
        }
        .back {
            display: block;
            margin-top: 12px;
            text-align: center;
            color: #2f74ff;
            text-decoration: none;
        }
        .tip {
            margin-bottom: 12px;
            color: #d9363e;
            font-size: 13px;
            min-height: 18px;
        }
    </style>
</head>
<body>
<div class="login-card">
    <h1 class="title">短信验证码登录</h1>
    <div class="tip" id="tip"></div>
    <form method="post" th:action="@{/login/sms}">
        <input class="input" id="phone" type="text" name="phone" placeholder="请输入手机号" required>
        <div class="row">
            <input class="input" type="text" name="code" placeholder="请输入验证码" required>
            <button class="ghost-btn" type="button" id="sendCodeBtn">发送验证码</button>
        </div>
        <input type="hidden" name="redirect" th:value="${redirect}">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
        <button class="btn" type="submit">登录</button>
    </form>
    <a class="back" th:href="@{/login}">返回账号密码登录</a>
</div>
<script>
    (function () {
        var btn = document.getElementById('sendCodeBtn');
        var phoneInput = document.getElementById('phone');
        var tip = document.getElementById('tip');
        var countdown = 0;
        var timer = null;

        function setTip(text) {
            tip.textContent = text || '';
        }

        function updateBtn() {
            if (countdown > 0) {
                btn.disabled = true;
                btn.textContent = countdown + 's';
            } else {
                btn.disabled = false;
                btn.textContent = '发送验证码';
            }
        }

        function startCountdown() {
            countdown = 60;
            updateBtn();
            timer = setInterval(function () {
                countdown -= 1;
                if (countdown <= 0) {
                    clearInterval(timer);
                    timer = null;
                }
                updateBtn();
            }, 1000);
        }

        btn.addEventListener('click', async function () {
            var phone = (phoneInput.value || '').trim();
            if (!phone) {
                setTip('请先输入手机号');
                return;
            }
            setTip('');
            try {
                var form = new URLSearchParams();
                form.set('phone', phone);
                var res = await fetch('/login/sms-code', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: form.toString(),
                    credentials: 'include'
                });
                var data = await res.json();
                if (!res.ok || data.code !== 200) {
                    throw new Error(data.msg || '发送失败');
                }
                setTip('验证码已发送');
                startCountdown();
            } catch (e) {
                setTip(e.message || '发送失败');
            }
        });
    })();
</script>
</body>
</html>
