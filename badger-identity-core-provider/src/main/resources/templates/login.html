<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plaza 登录</title>
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(180deg, #f3f7ff 0%, #eef3ff 100%);
            font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
        }
        .login-card {
            width: 360px;
            background: #fff;
            border-radius: 16px;
            box-shadow: 0 12px 30px rgba(28, 58, 124, 0.15);
            padding: 28px 26px 24px;
            box-sizing: border-box;
        }
        .title {
            margin: 0 0 8px;
            font-size: 24px;
            color: #1f2f5f;
            text-align: center;
        }
        .sub-title {
            margin: 0 0 24px;
            text-align: center;
            color: #8a95b5;
            font-size: 13px;
        }
        .error {
            margin-bottom: 14px;
            background: #ffeef0;
            color: #d9363e;
            border-radius: 8px;
            padding: 10px 12px;
            font-size: 13px;
        }
        .input-wrap {
            margin-bottom: 12px;
        }
        .input {
            width: 100%;
            height: 44px;
            border: 1px solid #d6ddf6;
            border-radius: 10px;
            padding: 0 12px;
            font-size: 15px;
            box-sizing: border-box;
            outline: none;
            transition: border-color .2s;
        }
        .input:focus {
            border-color: #3f7bff;
        }
        .btn {
            margin-top: 8px;
            width: 100%;
            height: 44px;
            border: 0;
            border-radius: 10px;
            background: #2f74ff;
            color: #fff;
            font-size: 16px;
            cursor: pointer;
        }
        .btn:hover {
            background: #2869ec;
        }
        .assist-row {
            margin-top: 12px;
            display: flex;
            gap: 10px;
        }
        .assist-btn {
            flex: 1;
            height: 40px;
            border: 1px solid #c7d6ff;
            border-radius: 10px;
            background: #f6f8ff;
            color: #2f74ff;
            font-size: 14px;
            cursor: pointer;
        }
        .assist-btn:hover {
            background: #edf2ff;
        }
    </style>
</head>
<body>
<div class="login-card">
    <h1 class="title">Badger 统一登录</h1>
    <p class="sub-title">登录后可访问 Plaza 与 Live 等业务系统</p>
    <div class="error" th:if="${param.error}">用户名或密码错误</div>
    <form method="post" th:action="@{/login}">
        <input class="input" type="text" name="username" placeholder="手机号 / 用户名" autocomplete="username" required>
        <div class="input-wrap"></div>
        <input class="input" type="password" name="password" placeholder="请输入密码" autocomplete="current-password" required>
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
        <button class="btn" type="submit">登录</button>
    </form>
    <div class="assist-row">
        <button id="smsLoginBtn" class="assist-btn" type="button">短信验证码登录</button>
    </div>
    <div id="plazaBaseConfig" th:attr="data-plaza-base=${@environment.getProperty('auth.plaza-web-base-url', '')}"></div>
</div>
<script>
    (function () {
        function resolveBaseFromReferrer() {
            if (!document.referrer) {
                return '';
            }
            try {
                var ref = new URL(document.referrer);
                var redirectUri = ref.searchParams.get('redirect_uri');
                if (!redirectUri) {
                    return '';
                }
                return new URL(decodeURIComponent(redirectUri)).origin;
            } catch (e) {
                return '';
            }
        }
        var holder = document.getElementById('plazaBaseConfig');
        var configuredBase = holder ? (holder.getAttribute('data-plaza-base') || '').trim() : '';
        var referrerBase = resolveBaseFromReferrer();
        var isLocal = function (value) {
            if (!value) return false;
            try {
                var host = new URL(value).hostname;
                return host === 'localhost' || host === '127.0.0.1';
            } catch (e) {
                return false;
            }
        };
        var candidateBase = configuredBase || referrerBase || window.location.origin;
        if (isLocal(candidateBase) && referrerBase && !isLocal(referrerBase)) {
            candidateBase = referrerBase;
        }
        var baseUrl = candidateBase.replace(/\/+$/, '');
        var current = window.location.href;
        var redirectTarget = current;
        if (document.referrer) {
            try {
                var refUrl = new URL(document.referrer);
                if (refUrl.pathname.indexOf('/oauth2/authorize') >= 0) {
                    redirectTarget = document.referrer;
                }
            } catch (e) {
            }
        }
        var redirect = encodeURIComponent(redirectTarget);
        var smsLoginUrl = baseUrl + '/login/sms?redirect=' + redirect;
        var smsBtn = document.getElementById('smsLoginBtn');
        if (smsBtn) {
            smsBtn.addEventListener('click', function () {
                window.location.href = smsLoginUrl;
            });
        }
    })();
</script>
</body>
</html>
